name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    name: frontend-out
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend export
        run: pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: houhub-out
          path: out
          if-no-files-found: error

  build-macos:
    name: ${{ matrix.name }}
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            dmg_arch: aarch64
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            dmg_arch: x64
    env:
      TARGET: ${{ matrix.target }}
      DMG_ARCH: ${{ matrix.dmg_arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.os }}-${{ matrix.target }}-app
          cache-on-failure: true

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Tauri CLI dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: houhub-out
          path: frontend-artifact

      - name: Stage frontend artifact
        shell: bash
        run: |
          rm -rf out
          if [ -d frontend-artifact/out ]; then
            mv frontend-artifact/out out
          else
            mkdir -p out
            cp -a frontend-artifact/. out/
          fi
          test -f out/index.html
          rm -rf frontend-artifact

      - name: Write CI Tauri config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const fs = require("node:fs")
          if (!process.env.TAURI_SIGNING_PRIVATE_KEY) {
            throw new Error("TAURI_SIGNING_PRIVATE_KEY is required for HouHub updater artifacts")
          }
          fs.writeFileSync(
            "tauri.ci.conf.json",
            JSON.stringify({
              build: { beforeBuildCommand: "pnpm tauri:prepare-sidecars" },
              bundle: { createUpdaterArtifacts: true },
            })
          )
          NODE

      - name: Build desktop bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target "${TARGET}" --bundles dmg --config tauri.ci.conf.json

      - name: Repair ad-hoc macOS app and DMG
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          dmg_dir="src-tauri/target/${TARGET}/release/bundle/dmg"
          version="$(node -p 'require("./package.json").version')"
          dmg_name="houhub_${version}_${DMG_ARCH}.dmg"
          dmg_path="$dmg_dir/$dmg_name"

          test -f "$dmg_path"

          rm -rf "$dmg_dir/fixed-src" "$dmg_dir/fixed-out"
          mkdir -p "$dmg_dir/fixed-src" "$dmg_dir/fixed-out"

          mount_dir="$(mktemp -d)"
          cleanup_mount() {
            hdiutil detach "$mount_dir" -quiet || true
            rm -rf "$mount_dir"
          }
          trap cleanup_mount EXIT
          hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse -quiet
          ditto "$mount_dir/houhub.app" "$dmg_dir/fixed-src/houhub.app"
          hdiutil detach "$mount_dir" -quiet
          trap - EXIT
          rm -rf "$mount_dir"

          app="$dmg_dir/fixed-src/houhub.app"
          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            codesign --force --deep --sign - --timestamp=none "$app"
          fi
          codesign --verify --deep --strict --verbose=2 "$app"

          ln -s /Applications "$dmg_dir/fixed-src/Applications"
          repaired_dmg="$dmg_dir/fixed-out/$dmg_name"
          for attempt in 1 2 3; do
            rm -f "$repaired_dmg"
            if hdiutil create \
              -volname houhub \
              -srcfolder "$dmg_dir/fixed-src" \
              -ov \
              -format UDZO \
              "$repaired_dmg"; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              echo "hdiutil create failed after $attempt attempts" >&2
              exit 1
            fi
            echo "hdiutil create attempt $attempt failed; retrying in 5 seconds" >&2
            sleep 5
          done

          mv "$repaired_dmg" "$dmg_path"
          hdiutil verify "$dmg_path"

      - name: Create macOS updater artifact
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for HouHub updater artifacts" >&2
            exit 1
          fi

          dmg_dir="src-tauri/target/${TARGET}/release/bundle/dmg"
          macos_dir="src-tauri/target/${TARGET}/release/bundle/macos"
          app="$dmg_dir/fixed-src/houhub.app"
          tar_path="$macos_dir/houhub.app.tar.gz"

          test -d "$app"
          mkdir -p "$macos_dir"
          rm -f "$tar_path" "$tar_path.sig"
          COPYFILE_DISABLE=1 tar -czf "$tar_path" -C "$dmg_dir/fixed-src" "houhub.app"

          pnpm tauri signer sign "$tar_path"
          test -f "$tar_path.sig"

      - name: Collect macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          version="$(node -p 'require("./package.json").version')"
          cp src-tauri/target/${TARGET}/release/bundle/dmg/*.dmg release-assets/
          cp src-tauri/target/${TARGET}/release/bundle/macos/houhub.app.tar.gz "release-assets/houhub_${version}_${DMG_ARCH}.app.tar.gz"
          cp src-tauri/target/${TARGET}/release/bundle/macos/houhub.app.tar.gz.sig "release-assets/houhub_${version}_${DMG_ARCH}.app.tar.gz.sig"
          for artifact in release-assets/*; do
            [ -f "$artifact" ] || continue
            case "$(basename "$artifact")" in
              SHA256SUMS-*) continue ;;
            esac
            shasum -a 256 "$artifact" | sed 's#  release-assets/#  #'
          done > "release-assets/SHA256SUMS-${TARGET}.txt"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: houhub-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: error

  build-windows:
    name: windows-x64
    needs: frontend
    runs-on: windows-2022
    env:
      TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: windows-2022-x86_64-pc-windows-msvc-app
          cache-on-failure: true

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install Tauri CLI dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --prefer-offline

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: houhub-out
          path: frontend-artifact

      - name: Stage frontend artifact
        shell: bash
        run: |
          rm -rf out
          if [ -d frontend-artifact/out ]; then
            mv frontend-artifact/out out
          else
            mkdir -p out
            cp -a frontend-artifact/. out/
          fi
          test -f out/index.html
          rm -rf frontend-artifact

      - name: Write CI Tauri config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          node <<'NODE'
          const fs = require("node:fs")
          if (!process.env.TAURI_SIGNING_PRIVATE_KEY) {
            throw new Error("TAURI_SIGNING_PRIVATE_KEY is required for HouHub updater artifacts")
          }
          fs.writeFileSync(
            "tauri.ci.conf.json",
            JSON.stringify({
              build: { beforeBuildCommand: "pnpm tauri:prepare-sidecars" },
              bundle: { createUpdaterArtifacts: true },
            })
          )
          NODE

      - name: Stage Windows sidecar
        shell: bash
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR=target/sidecar node src-tauri/scripts/prepare-sidecars.mjs --target "${TARGET}"
          test -s "src-tauri/binaries/houhub-mcp-${TARGET}.exe"

      - name: Compile Windows app
        shell: bash
        env:
          HOUHUB_SKIP_SIDECAR: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -s "src-tauri/binaries/houhub-mcp-${TARGET}.exe"
          pnpm tauri build --target "${TARGET}" --no-bundle --config tauri.ci.conf.json

      - name: Build Windows bundle
        shell: bash
        env:
          HOUHUB_SKIP_SIDECAR: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          test -s "src-tauri/binaries/houhub-mcp-${TARGET}.exe"
          pnpm tauri build --target "${TARGET}" --bundles nsis --config tauri.ci.conf.json

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $installer = Get-ChildItem "src-tauri\target\$($env:TARGET)\release\bundle\nsis" -Filter "*-setup.exe" |
            Sort-Object Name |
            Select-Object -First 1
          if (-not $installer) {
            throw "No Windows NSIS installer found."
          }
          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path -LiteralPath $signaturePath -PathType Leaf)) {
            throw "No Windows updater signature found: $signaturePath"
          }
          Copy-Item -LiteralPath $installer.FullName -Destination release-assets\ -Force
          Copy-Item -LiteralPath $signaturePath -Destination (Join-Path "release-assets" "$($installer.Name).sig") -Force
          $lines = Get-ChildItem release-assets | Get-FileHash -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash.ToLower())  $([System.IO.Path]::GetFileName($_.Path))"
          }
          [System.IO.File]::WriteAllText(
            "release-assets\SHA256SUMS-$($env:TARGET).txt",
            (($lines -join "`n") + "`n"),
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: houhub-windows-x64
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build-macos
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Apple Silicon artifacts
        uses: actions/download-artifact@v8
        with:
          name: houhub-macos-aarch64
          path: dist

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v8
        with:
          name: houhub-macos-x64
          path: dist

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: houhub-windows-x64
          path: dist

      - name: Build latest.json
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const tag = process.env.TAG_NAME || ""
          const version = tag.replace(/^v/, "")
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Cannot derive a semver version from tag: ${tag}`)
          }

          const dist = "dist"
          const baseUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tag}/`
          const requireFile = (name) => {
            const filePath = path.join(dist, name)
            if (!fs.existsSync(filePath)) {
              throw new Error(`Missing release artifact: ${filePath}`)
            }
            return name
          }
          const readSignature = (name) => {
            const filePath = path.join(dist, name)
            if (!fs.existsSync(filePath)) {
              throw new Error(`Missing updater signature: ${filePath}`)
            }
            const signature = fs.readFileSync(filePath, "utf8").trim()
            if (!signature) {
              throw new Error(`Updater signature is empty: ${filePath}`)
            }
            return signature
          }

          requireFile(`houhub_${version}_aarch64.app.tar.gz`)
          requireFile(`houhub_${version}_x64.app.tar.gz`)
          requireFile(`houhub_${version}_x64-setup.exe`)

          const payload = {
            version,
            notes: `houhub ${version}`,
            pub_date: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
            platforms: {
              "darwin-aarch64": {
                url: `${baseUrl}houhub_${version}_aarch64.app.tar.gz`,
                signature: readSignature(`houhub_${version}_aarch64.app.tar.gz.sig`),
              },
              "darwin-x86_64": {
                url: `${baseUrl}houhub_${version}_x64.app.tar.gz`,
                signature: readSignature(`houhub_${version}_x64.app.tar.gz.sig`),
              },
              "windows-x86_64": {
                url: `${baseUrl}houhub_${version}_x64-setup.exe`,
                signature: readSignature(`houhub_${version}_x64-setup.exe.sig`),
              },
            },
          }

          fs.writeFileSync(
            path.join(dist, "latest.json"),
            `${JSON.stringify(payload, null, 2)}\n`
          )
          NODE

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "houhub $TAG_NAME" \
              --notes "Automated desktop build for macOS Apple Silicon, macOS Intel, Windows, and signed updater metadata."
          fi
